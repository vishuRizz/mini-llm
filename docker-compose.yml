services:
  train:
    build:
      context: .
      dockerfile: Dockerfile
    image: mini-ml:latest
    gpus: all
    volumes:
      # Persist tokenizer, checkpoints, and processed data on the host
      - .:/app
    command: ["python", "scripts/train.py"]

  generate:
    build:
      context: .
      dockerfile: Dockerfile
    image: mini-ml:latest
    gpus: all
    profiles:
      - tools
    volumes:
      - .:/app
    command: ["python", "scripts/generate.py", "--prompt", "hi", "--tokens", "80"]
    stdin_open: false
    tty: false

  chat:
    build:
      context: .
      dockerfile: Dockerfile
    image: mini-ml:latest
    gpus: all
    profiles:
      - tools
    volumes:
      - .:/app
    stdin_open: true
    tty: true
    command: ["python", "scripts/chat.py"]
